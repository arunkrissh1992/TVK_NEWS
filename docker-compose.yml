services:
  # Local development only: credentials are non-production and published ports are loopback-bound.
  postgres:
    image: postgres:16.4
    environment:
      POSTGRES_DB: mediaintel
      POSTGRES_USER: mediaintel
      POSTGRES_PASSWORD: mediaintel
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.4
    ports:
      - "127.0.0.1:6379:6379"

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "ChangeMeStrong123!"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mediaintel
      MINIO_ROOT_PASSWORD: mediaintel123
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  opensearch-data:
  minio-data:
