# ---------------------------------------------------------------------------
# Tamil Nadu newspaper source registry — Phase B
# ---------------------------------------------------------------------------
# Each entry maps to a NewspaperSource record in tnmi.contracts.
#
# coverage_scope: "statewide" | "district" | "national-with-tn-bureau"
# district_focus: only set when coverage_scope == "district" (one of TN's 38
#                  districts, e.g. "Madurai", "Coimbatore")
#
# `active: true`  — pulled by every daily / Pull-Latest run
# `active: false` — registered but NOT pulled until the RSS URL is verified
#                   by an operator. Flip to true once confirmed.
#
# Operator workflow when activating a source:
#   1. Hit the rss_urls in a browser; confirm it returns an RSS/Atom feed
#   2. Confirm the publisher's robots.txt and terms permit machine reading
#   3. Note any rate limits in legal_notes
#   4. Flip active: true and rerun `python -m pipelines.run_daily_news`
# ---------------------------------------------------------------------------

newspapers:

