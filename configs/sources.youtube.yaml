# ---------------------------------------------------------------------------
# Tamil Nadu YouTube channel registry — Phase D
# ---------------------------------------------------------------------------
# Each entry maps to a YouTubeChannelSource record in tnmi.contracts.
# Ingestion (when wired): YouTube Data API discovers recent uploads per
# channel, yt-dlp pulls the audio, faster-whisper transcribes (Tamil), and
# the transcript flows through the same AIAnalysis pipeline as newspaper
# articles — same stance, same Party/People/Why/Next-step briefing lines.
#
# `active: true`  — channel is polled by the YouTube ingestion job
# `active: false` — registered for reference but not pulled (channel_id
#                   needs operator verification first)
#
# Channel IDs format: "UCxxxxxxxxxxxxxxxxxx" — visible in channel page source.
# The IDs below are PLACEHOLDERS until an operator verifies them via the
# YouTube Data API (channels.list response).
# ---------------------------------------------------------------------------

