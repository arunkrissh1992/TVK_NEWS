# Role-word mentions. The analyzer often emits bare "Chief Minister" /
# "Minister" / "MLA" with no name — resolving those to a specific person would
# be guesswork, so they map to office entities instead. Per this deployment's
# lens TVK holds the government: the CM office links to Vijay, and "Minister"
# denotes a TVK cabinet member (see _ACTOR_KEYWORDS in tnmi/ai.py).
offices:
  - slug: office-chief-minister
    canonical_name: Chief Minister's office
    name_ta: முதலமைச்சர்
    role: cm
    is_tvk: true
    aliases: ["Chief Minister", "CM", "முதலமைச்சர்", "முதல்வர்"]
    metadata: {holder: vijay}
  - slug: office-ministers
    canonical_name: Ministers (cabinet)
    name_ta: அமைச்சர்கள்
