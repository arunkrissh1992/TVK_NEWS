# Canonical entity roster — the nodes of the knowledge vault.
#
# This file is CONFIG, not code: it encodes this deployment's political
# reality (TVK governs Tamil Nadu; Vijay holds the CM office) so operators can
# edit the roster — add ministers, repoint office holders, add aliases —
# without touching Python. `python -m pipelines.resolve_entities` re-syncs.
#
# Districts are NOT listed here — they seed programmatically from
# tnmi/districts.py (the single source of truth, 38 districts with Tamil
# aliases). Sources seed from configs/sources.*.yaml plus observed
# raw_items.source_name values.
#
# Aliases: include every surface form the analyzer emits — English, Tamil,
# abbreviations, and the mock analyzer's labels (e.g. "Vijay (CM)",
# "DMK (opposition)") so tests and live data resolve identically.

